name: Daily LeetCode Sync

on:
  schedule:
    # Runs every day at 23:55 UTC — adjust to your timezone
    - cron: "55 23 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lc2git
        run: pip install lc2git

      - name: Sync solutions
        env:
          GITHUB_TOKEN: ${{ secrets.LC2GIT_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ secrets.LC2GIT_GITHUB_REPO }}
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: lc2git sync
